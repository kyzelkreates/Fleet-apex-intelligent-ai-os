[package]
name        = "fleet-apex-desktop"
version     = "1.0.0"
description = "Fleet Apex Intelligent AI — Desktop Application"
authors     = ["Fleet Apex"]
license     = "UNLICENSED"
edition     = "2021"
rust-version = "1.75"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
serde_json = "1.0"
serde      = { version = "1.0", features = ["derive"] }
tauri      = { version = "1.7", features = [
  "notification-all",
  "http-all",
  "fs-read-file",
  "fs-write-file",
  "fs-read-dir",
  "fs-create-dir",
  "path-all",
  "shell-open",
  "system-tray"
] }

[features]
default          = ["custom-protocol"]
custom-protocol  = ["tauri/custom-protocol"]

[profile.release]
opt-level     = "s"
lto           = true
codegen-units = 1
panic         = "abort"
strip         = true
