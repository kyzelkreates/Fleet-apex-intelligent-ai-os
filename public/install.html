<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Fleet Apex — Install</title>
<meta name="theme-color" content="#0a1628"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--bg:#0a1628;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);--accent:#00d4ff;--accent2:#7b61ff;--text:#fff;--muted:#8899aa;}
  body{min-height:100vh;background:var(--bg);background:radial-gradient(ellipse at 30% 20%,#0d2347 0%,#0a1628 60%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;}
  .shell{width:100%;max-width:420px;}
  .logo-wrap{text-align:center;margin-bottom:28px;}
  .logo-icon{width:90px;height:90px;background:linear-gradient(135deg,#0d4f7c,#1a8fc1);border-radius:24px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 8px 32px rgba(0,212,255,.25);}
  .logo-title{font-size:28px;font-weight:900;letter-spacing:-0.5px;}
  .logo-sub{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;}
  .card-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:14px;}
  .app-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .app-tile{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent;}
  .app-tile:active{transform:scale(.97);}
  .app-tile.selected-admin{border-color:var(--accent);background:rgba(0,212,255,.1);box-shadow:0 0 20px rgba(0,212,255,.2);}
  .app-tile.selected-driver{border-color:var(--accent2);background:rgba(123,97,255,.1);box-shadow:0 0 20px rgba(123,97,255,.2);}
  .app-tile-icon{font-size:34px;margin-bottom:8px;}
  .app-tile-name{font-size:13px;font-weight:800;}
  .app-tile-desc{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;}
  .launch-btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.06);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;}
  .launch-btn.ready-admin{background:linear-gradient(135deg,#0088cc,#00d4ff);color:#000;box-shadow:0 4px 20px rgba(0,212,255,.35);}
  .launch-btn.ready-driver{background:linear-gradient(135deg,#5544cc,#7b61ff);color:#fff;box-shadow:0 4px 20px rgba(123,97,255,.35);}
  .launch-btn:active{transform:scale(.98);}
  .reset-link{text-align:center;margin-top:12px;font-size:12px;color:var(--muted);cursor:pointer;}
  .reset-link span{text-decoration:underline;}
  .footer{text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:20px;}
</style>
</head>
<body>
<div class="shell">
  <div class="logo-wrap">
    <div class="logo-icon">🚛</div>
    <div class="logo-title">Fleet Apex</div>
    <div class="logo-sub">Intelligence Driving Every Journey</div>
  </div>
  <div class="card">
    <div class="card-label">Choose your app</div>
    <div class="app-grid">
      <div class="app-tile" id="tile-admin" onclick="selectApp('admin')">
        <div class="app-tile-icon">🖥️</div>
        <div class="app-tile-name">Fleet Dashboard</div>
        <div class="app-tile-desc">Admin · Live map · AI</div>
      </div>
      <div class="app-tile" id="tile-driver" onclick="selectApp('driver')">
        <div class="app-tile-icon">🚗</div>
        <div class="app-tile-name">Driver App</div>
        <div class="app-tile-desc">Navigation · SOS · Messages</div>
      </div>
    </div>
    <button class="launch-btn" id="launch-btn" onclick="doLaunch()">
      👆 Select an app above
    </button>
    <div class="reset-link" onclick="resetInstall()">Already installed? <span>Reset</span> ↺</div>
  </div>
  <div class="footer">Fleet Apex Intelligent AI · No app store needed</div>
</div>

<script>
  var selected = null;

  // Check if already installed — auto-redirect
  var last = localStorage.getItem('fa_last_app');
  if (last === 'admin') { window.location.replace('app.html?app=admin'); }
  else if (last === 'driver') { window.location.replace('app.html?app=driver'); }

  function selectApp(app) {
    selected = app;
    document.getElementById('tile-admin').className  = 'app-tile' + (app==='admin'?' selected-admin':'');
    document.getElementById('tile-driver').className = 'app-tile' + (app==='driver'?' selected-driver':'');
    var btn = document.getElementById('launch-btn');
    if (app === 'admin') {
      btn.textContent = '🚀 Open Fleet Dashboard';
      btn.className = 'launch-btn ready-admin';
    } else {
      btn.textContent = '🚛 Open Driver App';
      btn.className = 'launch-btn ready-driver';
    }
  }

  function doLaunch() {
    if (!selected) { alert('Please select Fleet Dashboard or Driver App first.'); return; }
    localStorage.setItem('fa_last_app', selected);
    window.location.href = 'app.html?app=' + selected;
  }

  function resetInstall() {
    localStorage.removeItem('fa_last_app');
    localStorage.removeItem('fa_admin_installed');
    localStorage.removeItem('fa_driver_installed');
    selected = null;
    document.getElementById('tile-admin').className  = 'app-tile';
    document.getElementById('tile-driver').className = 'app-tile';
    var btn = document.getElementById('launch-btn');
    btn.textContent = '👆 Select an app above';
    btn.className = 'launch-btn';
  }
</script>
</body>
</html>
