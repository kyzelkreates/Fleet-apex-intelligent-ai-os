name: Build Fleet Apex Desktop Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Linux (.deb + .AppImage) ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Set up Tauri project structure
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          mkdir -p tauri-desktop/dist
          cp tauri-src-main.rs    tauri-desktop/src-tauri/src/main.rs
          cp tauri-Cargo.toml     tauri-desktop/src-tauri/Cargo.toml
          cp tauri-conf.json      tauri-desktop/src-tauri/tauri.conf.json
          cp tauri-package.json   tauri-desktop/package.json
          cp install.html         tauri-desktop/dist/index.html
          # Icons (use placeholders if not present)
          mkdir -p tauri-desktop/src-tauri/icons
          if [ -f icon-admin-512.png ]; then
            cp icon-admin-512.png tauri-desktop/src-tauri/icons/128x128@2x.png
            cp icon-admin-192.png tauri-desktop/src-tauri/icons/128x128.png  2>/dev/null || true
            cp icon-admin-48.png  tauri-desktop/src-tauri/icons/32x32.png    2>/dev/null || true
          fi

      - name: Fix tauri.conf.json paths
        working-directory: tauri-desktop
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.build.distDir = '../dist';
            conf.build.devPath  = '../dist';
            conf.tauri.bundle.icon = [
              'icons/32x32.png',
              'icons/128x128.png',
              'icons/128x128@2x.png'
            ];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
            console.log('tauri.conf.json updated');
          "

      - name: Install npm dependencies
        working-directory: tauri-desktop
        run: npm install

      - name: Install Tauri CLI
        working-directory: tauri-desktop
        run: npm install --save-dev @tauri-apps/cli@1

      - name: Build Linux bundles
        working-directory: tauri-desktop
        run: npx tauri build --bundles deb,appimage
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-linux-deb
          path: tauri-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload Linux .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-linux-appimage
          path: tauri-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  # ── Windows (.msi + .exe) ─────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Set up Tauri project structure
        shell: bash
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          mkdir -p tauri-desktop/dist
          mkdir -p tauri-desktop/src-tauri/icons
          cp tauri-src-main.rs    tauri-desktop/src-tauri/src/main.rs
          cp tauri-Cargo.toml     tauri-desktop/src-tauri/Cargo.toml
          cp tauri-conf.json      tauri-desktop/src-tauri/tauri.conf.json
          cp tauri-package.json   tauri-desktop/package.json
          cp install.html         tauri-desktop/dist/index.html
          [ -f icon-admin-512.png ] && cp icon-admin-512.png tauri-desktop/src-tauri/icons/128x128@2x.png || true
          [ -f icon-admin-192.png ] && cp icon-admin-192.png tauri-desktop/src-tauri/icons/128x128.png || true
          [ -f icon-admin-48.png  ] && cp icon-admin-48.png  tauri-desktop/src-tauri/icons/32x32.png   || true

      - name: Fix tauri.conf.json paths
        working-directory: tauri-desktop
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.build.distDir = '../dist';
            conf.build.devPath  = '../dist';
            conf.tauri.bundle.icon = ['icons/32x32.png','icons/128x128.png','icons/128x128@2x.png'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "

      - name: Install npm dependencies
        working-directory: tauri-desktop
        run: npm install

      - name: Install Tauri CLI
        working-directory: tauri-desktop
        run: npm install --save-dev @tauri-apps/cli@1

      - name: Build Windows installer
        working-directory: tauri-desktop
        run: npx tauri build --bundles msi,nsis
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows .msi
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-windows-msi
          path: tauri-desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload Windows .exe
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-windows-exe
          path: tauri-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ── macOS (.dmg) ──────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable + universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Set up Tauri project structure
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          mkdir -p tauri-desktop/dist
          mkdir -p tauri-desktop/src-tauri/icons
          cp tauri-src-main.rs    tauri-desktop/src-tauri/src/main.rs
          cp tauri-Cargo.toml     tauri-desktop/src-tauri/Cargo.toml
          cp tauri-conf.json      tauri-desktop/src-tauri/tauri.conf.json
          cp tauri-package.json   tauri-desktop/package.json
          cp install.html         tauri-desktop/dist/index.html
          [ -f icon-admin-512.png ] && cp icon-admin-512.png tauri-desktop/src-tauri/icons/128x128@2x.png || true
          [ -f icon-admin-192.png ] && cp icon-admin-192.png tauri-desktop/src-tauri/icons/128x128.png || true
          [ -f icon-admin-48.png  ] && cp icon-admin-48.png  tauri-desktop/src-tauri/icons/32x32.png   || true

      - name: Fix tauri.conf.json paths
        working-directory: tauri-desktop
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));
            conf.build.distDir = '../dist';
            conf.build.devPath  = '../dist';
            conf.tauri.bundle.icon = ['icons/32x32.png','icons/128x128.png','icons/128x128@2x.png'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "

      - name: Install npm dependencies
        working-directory: tauri-desktop
        run: npm install

      - name: Install Tauri CLI
        working-directory: tauri-desktop
        run: npm install --save-dev @tauri-apps/cli@1

      - name: Build macOS DMG (universal binary)
        working-directory: tauri-desktop
        run: npx tauri build --target universal-apple-darwin --bundles dmg
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-macos-dmg
          path: tauri-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30
