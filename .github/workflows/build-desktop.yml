name: Build Fleet Apex Desktop Apps

on:
  push:
    branches: [main]
    paths:
      - 'install.html'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  # ── Windows .exe / .msi ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Install Tauri dependencies
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          copy tauri-src-main.rs tauri-desktop\src-tauri\src\main.rs
          copy tauri-Cargo.toml  tauri-desktop\src-tauri\Cargo.toml
          copy tauri-conf.json   tauri-desktop\src-tauri\tauri.conf.json
          copy tauri-package.json tauri-desktop\package.json
        shell: cmd

      - name: Prepare www for Tauri
        run: |
          mkdir -p tauri-desktop/dist
          cp install.html tauri-desktop/dist/index.html
        shell: bash

      - name: Install npm deps
        run: cd tauri-desktop && npm install

      - name: Build Windows installer
        run: cd tauri-desktop && npm run build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-windows-installer
          path: tauri-desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-windows-exe
          path: tauri-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ── macOS .dmg ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust (universal)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Prepare Tauri project
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          cp tauri-src-main.rs  tauri-desktop/src-tauri/src/main.rs
          cp tauri-Cargo.toml   tauri-desktop/src-tauri/Cargo.toml
          cp tauri-conf.json    tauri-desktop/src-tauri/tauri.conf.json
          cp tauri-package.json tauri-desktop/package.json
          mkdir -p tauri-desktop/dist
          cp install.html tauri-desktop/dist/index.html
          cd tauri-desktop && npm install

      - name: Build macOS DMG (universal binary)
        run: |
          cd tauri-desktop
          npm run build -- --target universal-apple-darwin
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-macos-dmg
          path: tauri-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

  # ── Linux .deb + .AppImage ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri-desktop/src-tauri -> target

      - name: Prepare Tauri project
        run: |
          mkdir -p tauri-desktop/src-tauri/src
          cp tauri-src-main.rs  tauri-desktop/src-tauri/src/main.rs
          cp tauri-Cargo.toml   tauri-desktop/src-tauri/Cargo.toml
          cp tauri-conf.json    tauri-desktop/src-tauri/tauri.conf.json
          cp tauri-package.json tauri-desktop/package.json
          mkdir -p tauri-desktop/dist
          cp install.html tauri-desktop/dist/index.html
          cd tauri-desktop && npm install

      - name: Build Linux packages
        run: cd tauri-desktop && npm run build

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-linux-deb
          path: tauri-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-linux-appimage
          path: tauri-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30
