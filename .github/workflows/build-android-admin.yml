name: Build Fleet Apex Admin APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Capacitor project directory ──────────────────────────────────
      - name: Create Capacitor project
        run: |
          mkdir -p capacitor-admin/www
          cp capacitor-admin-package.json capacitor-admin/package.json
          cd capacitor-admin
          npm install

      - name: Populate www directory
        run: |
          cp install.html        capacitor-admin/www/index.html
          cp sw.js               capacitor-admin/www/sw.js           2>/dev/null || true
          cp manifest.json       capacitor-admin/www/manifest.json   2>/dev/null || true
          [ -f icon-admin-192.png ] && cp icon-admin-192.png capacitor-admin/www/ || true
          [ -f icon-admin-512.png ] && cp icon-admin-512.png capacitor-admin/www/ || true

      - name: Write capacitor.config.json
        run: cp capacitor-admin-config.json capacitor-admin/capacitor.config.json

      # ── Add Android and let Capacitor scaffold the full project ───────────
      - name: Add Android platform & sync
        working-directory: capacitor-admin
        run: |
          npx cap add android
          npx cap sync android

      # ── Patch AndroidManifest AFTER Capacitor scaffolds it ────────────────
      - name: Patch AndroidManifest.xml
        working-directory: capacitor-admin
        run: |
          python3 << 'PY'
          import re, os
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          perms = [
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.CAMERA',
              'android.permission.VIBRATE',
              'android.permission.WAKE_LOCK',
              'android.permission.RECEIVE_BOOT_COMPLETED',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.FOREGROUND_SERVICE',
          ]
          lines = []
          for p in perms:
              if p not in content:
                  lines.append(f'    <uses-permission android:name="{p}" />')
          if lines:
              insert = '\n'.join(lines)
              content = content.replace('<application', insert + '\n\n    <application', 1)
              with open(path, 'w') as f:
                  f.write(content)
              print('Patched', len(lines), 'permissions')
          else:
              print('No new permissions needed')
          PY

      # ── Copy res overrides ────────────────────────────────────────────────
      - name: Apply res overrides
        working-directory: capacitor-admin
        run: |
          cp ../android-admin-res/values/strings.xml  android/app/src/main/res/values/strings.xml
          cp ../android-admin-res/values/colors.xml   android/app/src/main/res/values/colors.xml
          cp ../android-admin-res/xml/network_security_config.xml \
             android/app/src/main/res/xml/network_security_config.xml 2>/dev/null || true

      # ── Set up Android SDK ────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Gradle build ───────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: capacitor-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-admin-debug-apk
          path: capacitor-admin/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
