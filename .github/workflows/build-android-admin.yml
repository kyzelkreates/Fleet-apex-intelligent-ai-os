name: Build Fleet Apex Admin APK

on:
  push:
    branches: [main]
    paths:
      - 'install.html'
      - 'sw.js'
      - 'manifest.json'
      - '.github/workflows/build-android-admin.yml'
  workflow_dispatch:

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: capacitor-admin/package.json

      - name: Install Capacitor dependencies
        run: |
          mkdir -p capacitor-admin
          cp capacitor-admin-package.json capacitor-admin/package.json
          cd capacitor-admin
          npm install

      - name: Prepare www directory
        run: |
          mkdir -p capacitor-admin/www
          cp install.html                    capacitor-admin/www/index.html
          cp sw.js                           capacitor-admin/www/sw.js          2>/dev/null || true
          cp manifest.json                   capacitor-admin/www/manifest.json  2>/dev/null || true
          cp icon-admin-192.png              capacitor-admin/www/               2>/dev/null || true
          cp icon-admin-512.png              capacitor-admin/www/               2>/dev/null || true
          cp capacitor-admin-config.json     capacitor-admin/capacitor.config.json

      - name: Add Android platform
        run: |
          cd capacitor-admin
          npx cap add android
          npx cap sync android

      - name: Apply Android config stubs
        run: |
          cd capacitor-admin
          cp ../android-admin-manifest.xml android/app/src/main/AndroidManifest.xml
          cp -r ../android-admin-res/values/   android/app/src/main/res/values/
          cp -r ../android-admin-res/drawable/ android/app/src/main/res/drawable/  2>/dev/null || true
          cp -r ../android-admin-res/xml/      android/app/src/main/res/xml/       2>/dev/null || true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd capacitor-admin/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Sign release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd capacitor-admin/android
          ./gradlew assembleRelease --no-daemon
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/fleet-apex-admin-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-admin-debug-apk
          path: capacitor-admin/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-admin-release-apk
          path: capacitor-admin/android/app/build/outputs/apk/release/fleet-apex-admin-signed.apk
          retention-days: 90
