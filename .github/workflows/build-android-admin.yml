name: Build Fleet Apex Admin APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-admin-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor CLI + dependencies
        run: |
          npm install -g @capacitor/cli@5
          mkdir -p capacitor-admin
          cp capacitor-admin-package.json capacitor-admin/package.json
          cd capacitor-admin
          npm install

      - name: Prepare www directory
        run: |
          mkdir -p capacitor-admin/www
          cp install.html          capacitor-admin/www/index.html
          cp sw.js                 capacitor-admin/www/sw.js          2>/dev/null || true
          cp manifest.json         capacitor-admin/www/manifest.json  2>/dev/null || true
          [ -f icon-admin-192.png ] && cp icon-admin-192.png capacitor-admin/www/ || true
          [ -f icon-admin-512.png ] && cp icon-admin-512.png capacitor-admin/www/ || true
          cp capacitor-admin-config.json capacitor-admin/capacitor.config.json

      - name: Add Android platform
        working-directory: capacitor-admin
        run: |
          npx cap add android
          npx cap sync android

      - name: Apply Android resource stubs
        working-directory: capacitor-admin
        run: |
          cp ../android-admin-manifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/xml
          cp ../android-admin-res/values/strings.xml android/app/src/main/res/values/strings.xml
          cp ../android-admin-res/values/colors.xml  android/app/src/main/res/values/colors.xml
          cp ../android-admin-res/values/styles.xml  android/app/src/main/res/values/styles.xml
          cp ../android-admin-res/drawable/splash.xml android/app/src/main/res/drawable/splash.xml
          cp ../android-admin-res/xml/network_security_config.xml android/app/src/main/res/xml/network_security_config.xml

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: capacitor-admin/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-admin-debug-apk
          path: capacitor-admin/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Sign & upload release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: capacitor-admin/android
        run: |
          ./gradlew assembleRelease --no-daemon
          echo "$KEYSTORE_BASE64" | base64 -d > release.jks
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/fleet-apex-admin-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-admin-release-apk
          path: capacitor-admin/android/app/build/outputs/apk/release/fleet-apex-admin-signed.apk
          retention-days: 90
