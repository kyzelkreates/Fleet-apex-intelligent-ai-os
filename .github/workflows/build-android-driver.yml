name: Build Fleet Apex Driver APK

on:
  push:
    branches: [main]
    paths:
      - 'install.html'
      - 'sw_driver-pwa_public.js'
      - 'manifest_driver-pwa_public.json'
      - '.github/workflows/build-android-driver.yml'
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build-driver-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node 20 ─────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: capacitor-driver/package.json

      # ── 4. Install Capacitor project ────────────────────────────────────────
      - name: Install Capacitor dependencies
        run: |
          mkdir -p capacitor-driver
          cp capacitor-driver-package.json capacitor-driver/package.json
          cd capacitor-driver
          npm install

      # ── 5. Prepare www/ (copy flat files into Capacitor web dir) ───────────
      - name: Prepare www directory
        run: |
          mkdir -p capacitor-driver/www
          cp install.html                          capacitor-driver/www/index.html
          cp sw_driver-pwa_public.js               capacitor-driver/www/sw.js          2>/dev/null || true
          cp manifest_driver-pwa_public.json       capacitor-driver/www/manifest.json  2>/dev/null || true
          cp icon-driver-192.png                   capacitor-driver/www/                2>/dev/null || true
          cp icon-driver-512.png                   capacitor-driver/www/                2>/dev/null || true
          cp capacitor-driver-config.json          capacitor-driver/capacitor.config.json

      # ── 6. Add Android platform ─────────────────────────────────────────────
      - name: Add Android platform
        run: |
          cd capacitor-driver
          npx cap add android
          npx cap sync android

      # ── 7. Apply manifest + resource stubs ─────────────────────────────────
      - name: Apply Android config stubs
        run: |
          cd capacitor-driver
          # Merge manifest
          cp ../android-driver-manifest.xml android/app/src/main/AndroidManifest.xml
          # Values (strings, styles, colors)
          cp -r ../android-driver-res/values/   android/app/src/main/res/values/
          cp -r ../android-driver-res/drawable/ android/app/src/main/res/drawable/  2>/dev/null || true
          cp -r ../android-driver-res/xml/      android/app/src/main/res/xml/       2>/dev/null || true

      # ── 8. Set up Android SDK ───────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 9. Build debug APK ──────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd capacitor-driver/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 10. (Optional) Sign release APK if keystore secret is set ──────────
      - name: Sign release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          cd capacitor-driver/android
          ./gradlew assembleRelease --no-daemon

          # Decode keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

          # Sign
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/fleet-apex-driver-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 11. Upload APK as artifact ──────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-driver-debug-apk
          path: capacitor-driver/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload signed release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fleet-apex-driver-release-apk
          path: capacitor-driver/android/app/build/outputs/apk/release/fleet-apex-driver-signed.apk
          retention-days: 90
